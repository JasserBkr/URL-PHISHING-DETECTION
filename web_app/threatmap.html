// ═══════════════════════════════════════════════════════════════
// COORDINATE HELPERS
// ═══════════════════════════════════════════════════════════════
function ll2v(lat,lon,r){
  const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(theta),
     r*Math.cos(phi),
     r*Math.sin(phi)*Math.sin(theta)
  );
}

function ll2px(lon,lat,W,H){
  return [(lon+180)/360*W, (90-lat)/180*H];
}

// ═══════════════════════════════════════════════════════════════
// EARTH TEXTURE — built from GeoJSON via fetch
// Cyber style: dark red/black ocean, coral land, bright borders
// ═══════════════════════════════════════════════════════════════
async function buildEarthTexture(geojson){
  const W=4096, H=2048;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // ──real equirectangular earth photo as base ─────────
  await new Promise(resolve=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      ctx.drawImage(img,0,0,W,H);
      ctx.fillStyle='rgba(10,0,0,0.62)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(60,0,0,0.22)'; ctx.fillRect(0,0,W,H);
      resolve();
    };
    img.onerror=()=>{ ctx.fillStyle='#100000'; ctx.fillRect(0,0,W,H); resolve(); };
    img.src='https://unpkg.com/three-globe/example/img/earth-night.jpg';
  });

  // ──cyber grid ───────────────────────────────────────
  ctx.strokeStyle='rgba(234,7,3,0.07)'; ctx.lineWidth=0.8;
  for(let lon=-180;lon<=180;lon+=10){
    const x=(lon+180)/360*W;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(let lat=-90;lat<=90;lat+=10){
    const y=(90-lat)/180*H;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  ctx.strokeStyle='rgba(234,7,3,0.18)'; ctx.lineWidth=1.2;
  const eqY=(90)/180*H;
  ctx.beginPath(); ctx.moveTo(0,eqY); ctx.lineTo(W,eqY); ctx.stroke();
  ctx.strokeStyle='rgba(234,7,3,0.07)'; ctx.lineWidth=0.8;
  [23.5,-23.5,66.5,-66.5].forEach(lat=>{
    const y=(90-lat)/180*H;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  });

  // ──country borders from GeoJSON ─────────────────────
  function drawFeature(feature){
    const geom=feature.geometry; if(!geom) return;
    const polys=geom.type==='Polygon'?[geom.coordinates]:geom.type==='MultiPolygon'?geom.coordinates:[];
    polys.forEach(poly=>{
      poly.forEach((ring,ri)=>{
        ctx.beginPath();
        ring.forEach(([lon,lat],i)=>{
          const [x,y]=ll2px(lon,lat,W,H);
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        });
        ctx.closePath();
        ctx.strokeStyle='rgba(255,142,125,0.5)';
        ctx.lineWidth=ri===0?1.4:0.7;
        ctx.stroke();
      });
    });
  }
  geojson.features.forEach(f=>drawFeature(f));

  // ──continent labels ──────────────────────────────────
  const CONTINENT_LABELS=[
    {name:'NORTH AMERICA',lon:-100,lat:50},{name:'SOUTH AMERICA',lon:-60,lat:-15},
    {name:'EUROPE',lon:15,lat:52},{name:'AFRICA',lon:20,lat:5},
    {name:'ASIA',lon:90,lat:45},{name:'OCEANIA',lon:134,lat:-25},
    {name:'ANTARCTICA',lon:0,lat:-80},
  ];
  ctx.font='bold 28px "Share Tech Mono", monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  CONTINENT_LABELS.forEach(({name,lon,lat})=>{
    const [x,y]=ll2px(lon,lat,W,H);
    ctx.fillStyle='rgba(255,142,125,0.55)';
    ctx.letterSpacing='4px';
    ctx.fillText(name,x,y);
  });
  return new THREE.CanvasTexture(cv);
}

function makeTextSprite(text, fontSize=18, color='rgba(255,142,125,0.8)'){
  const canvas2=document.createElement('canvas');
  canvas2.width=256; canvas2.height=64;
  const ctx2=canvas2.getContext('2d');
  ctx2.clearRect(0,0,256,64);
  ctx2.font=`${fontSize}px "Share Tech Mono", monospace`;
  ctx2.fillStyle=color;
  ctx2.textAlign='center';
  ctx2.textBaseline='middle';
  ctx2.fillText(text,128,32);
  const tex=new THREE.CanvasTexture(canvas2);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(14,3.5,1);
  return sprite;
}

function buildLabels(){
  COUNTRY_LABELS.forEach(({n,lat,lon})=>{
    const pos=ll2v(lat,lon,R+2.5);
    const sprite=makeTextSprite(n,16,'rgba(255,140,120,0.75)');
    sprite.position.copy(pos);
    labelGroup.add(sprite);
  });
  scene.add(labelGroup);
}

// ═══════════════════════════════════════════════════════════════
// GLOBE MESH
// ═══════════════════════════════════════════════════════════════
let globe, mGroup;

async function initGlobe(){
  setProgress(10,'Fetching world borders...');

  let geojson;
  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const topo = await res.json();
    geojson = topoToGeo(topo);
    setProgress(40,'Rendering terrain...');
  } catch(e){
    console.warn('GeoJSON fetch failed, using fallback texture');
    geojson = { features:[] };
    setProgress(40,'Using fallback terrain...');
  }

  const earthTex = await buildEarthTexture(geojson);
  setProgress(70,'Building globe...');

  globe = new THREE.Mesh(
    new THREE.SphereGeometry(R,80,80),
    new THREE.MeshPhongMaterial({
      map: earthTex,
      specular: new THREE.Color(0x220000),
      shininess: 6,
      emissive: new THREE.Color(0x0a0000),
      emissiveIntensity: 0.5,
    })
  );
  scene.add(globe);

  // atmosphere
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(R*1.035,48,48),
    new THREE.MeshPhongMaterial({
      color:0xea0703, transparent:true, opacity:0.04, side:THREE.BackSide
    })
  ));

  mGroup = new THREE.Group(); scene.add(mGroup);

  setProgress(85,'Placing labels...');
  buildLabels();

  setProgress(100,'Ready.');
  await new Promise(r=>setTimeout(r,400));

}

// ═══════════════════════════════════════════════════════════════
// MINI TOPOJSON → GEOJSON CONVERTER
// ═══════════════════════════════════════════════════════════════
function topoToGeo(topo){
  const key = Object.keys(topo.objects)[0];
  const obj = topo.objects[key];
  const arcs = topo.arcs;
  const scale = topo.transform ? topo.transform.scale : [1,1];
  const translate = topo.transform ? topo.transform.translate : [0,0];

  function decodeArc(arcIdx){
    const reversed = arcIdx < 0;
    const arc = arcs[reversed ? ~arcIdx : arcIdx];
    let x=0, y=0;
    const pts = arc.map(([dx,dy])=>{
      x+=dx; y+=dy;
      return [x*scale[0]+translate[0], y*scale[1]+translate[1]];
    });
    return reversed ? pts.slice().reverse() : pts;
  }

  function ringCoords(ring){
    const pts=[];
    ring.forEach(arcIdx=>{ const a=decodeArc(arcIdx); pts.push(...(pts.length?a.slice(1):a)); });
    return pts;
  }

  const features = (obj.geometries||[]).map(g=>{
    let coords;
    if(g.type==='Polygon'){
      coords = g.arcs.map(r=>ringCoords(r));
    } else if(g.type==='MultiPolygon'){
      coords = g.arcs.map(poly=>poly.map(r=>ringCoords(r)));
    } else {
      return null;
    }
    return { type:'Feature', properties:g.properties||{}, geometry:{ type:g.type, coordinates:coords } };
  }).filter(Boolean);

  return { type:'FeatureCollection', features };
}

function addMarker(evt){
  const col  = new THREE.Color(RISK_COL[evt.risk]);
  const pos  = ll2v(evt.lat, evt.lon, R+1.8);
  const size = evt.risk==='high'?2.4:evt.risk==='medium'?1.8:1.3;

  const core=new THREE.Mesh(
    new THREE.SphereGeometry(size,14,14),
    new THREE.MeshBasicMaterial({color:col})
  );
  core.position.copy(pos); core.userData=evt; mGroup.add(core);

  const halo=new THREE.Mesh(
    new THREE.SphereGeometry(size*2.2,10,10),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.1})
  );
  halo.position.copy(pos); mGroup.add(halo);
}

// ═══════════════════════════════════════════════════════════════
// ARCS
// ═══════════════════════════════════════════════════════════════
const arcObjects=[];

function addArc(evt){
  const start=ll2v(ORIGIN.lat,ORIGIN.lon,R);
  const end=ll2v(evt.lat,evt.lon,R);
  const dist=start.distanceTo(end);
  const arcH=R+dist*0.55;
  const mid=start.clone().add(end).multiplyScalar(0.5).normalize().multiplyScalar(arcH);
  const curve=new THREE.QuadraticBezierCurve3(start,mid,end);

  const opacity=evt.risk==='high'?0.9:evt.risk==='medium'?0.65:0.4;
  const pts=curve.getPoints(100);
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({
    color:new THREE.Color(RISK_COL[evt.risk]),
    transparent:true, opacity
  });
  mGroup.add(new THREE.Line(geo,mat));
}

// ═══════════════════════════════════════════════════════════════
// DRAG + ZOOM
// ═══════════════════════════════════════════════════════════════
let dragging=false, prevMouse={x:0,y:0}, autoRot=true;

canvas.addEventListener('mousedown',e=>{ dragging=true; prevMouse={x:e.clientX,y:e.clientY}; autoRot=false; });
window.addEventListener('mouseup',()=>{ dragging=false; setTimeout(()=>autoRot=true,3000); });
window.addEventListener('mousemove',e=>{
  if(!dragging||!globe) return;
  const dx=(e.clientX-prevMouse.x)*0.005, dy=(e.clientY-prevMouse.y)*0.005;
  globe.rotation.y+=dx; globe.rotation.x=Math.max(-1,Math.min(1,globe.rotation.x+dy));
  mGroup.rotation.y+=dx; mGroup.rotation.x=Math.max(-1,Math.min(1,mGroup.rotation.x+dy));
  labelGroup.rotation.y+=dx; labelGroup.rotation.x=Math.max(-1,Math.min(1,labelGroup.rotation.x+dy));
  prevMouse={x:e.clientX,y:e.clientY};
});
canvas.addEventListener('wheel',e=>{
  camera.position.z=Math.max(140,Math.min(500,camera.position.z+e.deltaY*0.18));
},{passive:true});

// ═══════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════
function resize(){
  const w=widget.clientWidth,h=widget.clientHeight;
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();

// ═══════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════
function startLoop(){
  (function animate(){
    requestAnimationFrame(animate);
    if(autoRot&&globe){
      globe.rotation.y+=0.0012;
      mGroup.rotation.y+=0.0012;
      labelGroup.rotation.y+=0.0012;
    }
    const rotQ=new THREE.Quaternion().setFromEuler(mGroup.rotation);
    arcObjects.forEach(a=>{
      a.t+=a.speed; if(a.t>1) a.t=0;
      a.dot.position.copy(a.curve.getPoint(a.t).clone().applyQuaternion(rotQ));
    });
    renderer.render(scene,camera);
  })();
}

// ═══════════════════════════════════════════════════════════════
// STATE + EVENTS
// ═══════════════════════════════════════════════════════════════
const events=[];
let cntH=0,cntM=0,cntL=0;

function ingestEvent(evt){
  const idx=events.length; events.push(evt);
  if(globe){ addMarker(evt); addArc(evt); }
  addToFeed(evt,idx);
  if(evt.risk==='high')        {cntH++;document.getElementById('g-cnt-h').textContent=cntH;}
  else if(evt.risk==='medium') {cntM++;document.getElementById('g-cnt-m').textContent=cntM;}
  else                         {cntL++;document.getElementById('g-cnt-l').textContent=cntL;}
  document.getElementById('g-total').textContent=`${events.length} event${events.length!==1?'s':''}`;
  showDetail(idx);
}

function addToFeed(evt,idx){
  const feed=document.getElementById('g-feed');
  const item=document.createElement('div');
  item.className='g-feed-item'; item.id=`gfi-${idx}`;
  const rc={high:'rh',medium:'rm',low:'rl'}[evt.risk];
  item.innerHTML=`
    <div class="g-feed-url">${evt.url}</div>
    <div class="g-feed-meta">
      <span class="rbadge ${rc}">${evt.risk}</span>
      <span>${evt.city||'?'}, ${evt.countryCode||'?'}</span>
      <span style="margin-left:auto">${evt.timestamp.slice(11,19)}</span>
    </div>`;
  item.onclick=()=>showDetail(idx);
  feed.insertBefore(item,feed.firstChild);
}

function showDetail(idx){
  const evt=events[idx],col=RISK_COL[evt.risk],pct=Math.round(evt.score*100);
  document.querySelectorAll('.g-feed-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(`gfi-${idx}`)?.classList.add('active');
  document.getElementById('g-det-empty').style.display='none';
  const card=document.getElementById('g-det-card'); card.classList.remove('hidden');
  card.innerHTML=`
    <div style="color:#fff;border-bottom:1px solid #111;padding-bottom:8px;margin-bottom:8px;word-break:break-all;line-height:1.6">${evt.url}</div>
    <div style="line-height:2.2">
      <div class="flex justify-between"><span style="color:#adaaaa">Risk</span><span style="color:${col};font-weight:700">${evt.risk.toUpperCase()}</span></div>
      <div class="flex justify-between"><span style="color:#adaaaa">IP</span><span style="color:#fff">${evt.ip||'—'}</span></div>
      <div class="flex justify-between"><span style="color:#adaaaa">City</span><span style="color:#fff">${evt.city||'—'}</span></div>
      <div class="flex justify-between"><span style="color:#adaaaa">Country</span><span style="color:#fff">${evt.country||evt.countryCode||'—'}</span></div>
      <div class="flex justify-between"><span style="color:#adaaaa">ISP</span><span style="color:#fff;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${evt.isp||'—'}</span></div>
      <div class="flex justify-between"><span style="color:#adaaaa">ASN</span><span style="color:#fff;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${evt.asn||'—'}</span></div>
      <div class="flex justify-between"><span style="color:#adaaaa">Time</span><span style="color:#fff">${evt.timestamp.slice(0,19).replace('T',' ')}</span></div>
    </div>`;
  document.getElementById('g-score-sec').classList.remove('hidden');
  document.getElementById('g-score-pct').textContent=`${pct}%`;
  document.getElementById('g-score-pct').style.color=col;
  document.getElementById('g-score-fill').style.width=`${pct}%`;
  document.getElementById('g-score-fill').style.background=col;
  document.getElementById('g-score-fill').style.boxShadow=`0 0 10px ${col}88`;
}

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function toast(msg,color='#ff2525'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.color=color;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
}

// ═══════════════════════════════════════════════════════════════
// ANALYZE
// ═══════════════════════════════════════════════════════════════
window.gAnalyze=async function(){
  const input=document.getElementById('g-url-input');
  const btn=document.getElementById('g-analyze-btn');
  const url=input.value.trim();
  if(!url){toast('Enter a URL first');return;}
  btn.disabled=true; btn.textContent='⏳ ANALYZING...';
  try{
    const res=await fetch(BACKEND_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({"url": url}),
    });
    if(!res.ok){const e=await res.json().catch(()=>({})); throw new Error(e.detail||`Error ${res.status}`);}
    const evt=await res.json();
    console.log(evt);
    ingestEvent(evt);
    toast(`${evt.risk.toUpperCase()} · ${Math.round(evt.score*100)}% · ${evt.city}`,
      evt.risk==='high'?'#ff2525':evt.risk==='medium'?'#ff8c00':'#00e676');
  }catch(e){
    console.warn('Backend offline, demo mode:',e.message);
    toast('⚠ Backend offline — demo mode','#ff8c00');
    await new Promise(r=>setTimeout(r,700));
    ingestEvent(makeDemoEvent(url));
  }finally{
    btn.disabled=false; btn.textContent='⚡ RUN ANALYSIS'; input.value='';
  }
};
document.getElementById('g-url-input').addEventListener('keydown',e=>{if(e.key==='Enter')gAnalyze();});
// ═══════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════
setInterval(()=>{
  document.getElementById('g-clock').textContent=
    new Date().toUTCString().slice(17,25)+' UTC';
},1000);
initGlobe();

})();
</script>
